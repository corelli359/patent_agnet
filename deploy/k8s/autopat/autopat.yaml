apiVersion: v1
kind: Namespace
metadata:
  name: autopat
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: autopat-frontend-nginx
  namespace: autopat
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autopat-backend
  namespace: autopat
spec:
  progressDeadlineSeconds: 1800
  replicas: 1
  selector:
    matchLabels:
      app: autopat-backend
  template:
    metadata:
      labels:
        app: autopat-backend
    spec:
      volumes:
        - name: repo-src
          hostPath:
            path: __NODE_REPO_PATH__
            type: Directory
        - name: backend-venv
          emptyDir: {}
        - name: backend-pip-cache
          hostPath:
            path: __NODE_REPO_PATH__/data/runtime/k8s/pip-cache
            type: DirectoryOrCreate
      initContainers:
        - name: prepare-backend
          image: python:3.12
          command:
            - sh
            - -lc
            - |
              if [ ! -x /venv/bin/python ]; then
                python -m venv /venv
              fi
              /venv/bin/pip install --upgrade pip
              export PIP_CACHE_DIR=/pip-cache
              /venv/bin/pip install -r /repo/backend/requirements.txt
          volumeMounts:
            - name: repo-src
              mountPath: /repo
              readOnly: true
            - name: backend-venv
              mountPath: /venv
            - name: backend-pip-cache
              mountPath: /pip-cache
      containers:
        - name: backend
          image: python:3.12
          workingDir: /app/backend
          command:
            - sh
            - -lc
            - |
              mkdir -p /app/data /app/logs
              exec /venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
          envFrom:
            - secretRef:
                name: autopat-env
          env:
            - name: PYTHONPATH
              value: /app:/app/backend
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: repo-src
              mountPath: /app
            - name: backend-venv
              mountPath: /venv
            - name: backend-pip-cache
              mountPath: /pip-cache
---
apiVersion: v1
kind: Service
metadata:
  name: autopat-backend
  namespace: autopat
spec:
  selector:
    app: autopat-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autopat-frontend
  namespace: autopat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autopat-frontend
  template:
    metadata:
      labels:
        app: autopat-frontend
    spec:
      volumes:
        - name: repo-src
          hostPath:
            path: __NODE_REPO_PATH__
            type: Directory
        - name: frontend-work
          emptyDir: {}
        - name: frontend-dist
          emptyDir: {}
        - name: frontend-nginx
          configMap:
            name: autopat-frontend-nginx
        - name: frontend-npm-cache
          hostPath:
            path: __NODE_REPO_PATH__/data/runtime/k8s/npm-cache
            type: DirectoryOrCreate
      initContainers:
        - name: build-frontend
          image: node:20-alpine
          command:
            - sh
            - -lc
            - |
              export npm_config_cache=/npm-cache
              cp -a /repo/frontend-react/. /workspace/frontend/
              cd /workspace/frontend
              npm install
              npm run build
              cp -a dist/. /dist/
          volumeMounts:
            - name: repo-src
              mountPath: /repo
              readOnly: true
            - name: frontend-work
              mountPath: /workspace/frontend
            - name: frontend-dist
              mountPath: /dist
            - name: frontend-npm-cache
              mountPath: /npm-cache
      containers:
        - name: frontend
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: frontend-dist
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: frontend-nginx
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: autopat-frontend
  namespace: autopat
spec:
  selector:
    app: autopat-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autopat-ingress
  namespace: autopat
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: autopat-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: autopat-frontend
                port:
                  number: 80
